# ============================================================
# Test configuration
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/catapult_test}
spring.datasource.username=${DB_USERNAME:catapult}
spring.datasource.password=${DB_PASSWORD:catapult}
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

app.security.token-encryption-key=${TOKEN_ENCRYPTION_KEY:test-encryption-key-32bytes!}

# ============================================================
# OAuth2 — Twitch
# ============================================================
spring.security.oauth2.client.registration.twitch.client-id=${TWITCH_CLIENT_ID:test-client}
spring.security.oauth2.client.registration.twitch.client-secret=${TWITCH_CLIENT_SECRET:test-secret}
spring.security.oauth2.client.registration.twitch.scope=user:read:email,channel:manage:broadcast
spring.security.oauth2.client.registration.twitch.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.twitch.redirect-uri=http://localhost/login/oauth2/code/twitch
spring.security.oauth2.client.provider.twitch.authorization-uri=https://id.twitch.tv/oauth2/authorize
spring.security.oauth2.client.provider.twitch.token-uri=https://id.twitch.tv/oauth2/token
spring.security.oauth2.client.provider.twitch.user-info-uri=https://api.twitch.tv/helix/users
spring.security.oauth2.client.provider.twitch.user-name-attribute=id

# ============================================================
# OAuth2 — Steam (provider secondaire — endpoints factices pour les tests)
# ============================================================
spring.security.oauth2.client.registration.steam.client-id=${STEAM_CLIENT_ID:test-client}
spring.security.oauth2.client.registration.steam.client-secret=${STEAM_CLIENT_SECRET:test-secret}
spring.security.oauth2.client.registration.steam.scope=read
spring.security.oauth2.client.registration.steam.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.steam.redirect-uri=http://localhost/login/oauth2/code/steam
spring.security.oauth2.client.provider.steam.authorization-uri=https://steamcommunity.com/openid/login
spring.security.oauth2.client.provider.steam.token-uri=https://steamcommunity.com/openid/login
spring.security.oauth2.client.provider.steam.user-info-uri=https://api.steampowered.com/ISteamUser/GetPlayerSummaries/v0002
spring.security.oauth2.client.provider.steam.user-name-attribute=steamid

# ============================================================
# OAuth2 — Discord (provider secondaire)
# ============================================================
spring.security.oauth2.client.registration.discord.client-id=${DISCORD_CLIENT_ID:test-client}
spring.security.oauth2.client.registration.discord.client-secret=${DISCORD_CLIENT_SECRET:test-secret}
spring.security.oauth2.client.registration.discord.scope=identify,activities.read
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.redirect-uri=http://localhost/login/oauth2/code/discord
spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=id

# ============================================================
# IGDB
# ============================================================
app.igdb.client-id=test
app.igdb.preload-ttl-hours=24

# ============================================================
# App
# ============================================================
app.polling.interval-seconds=60
app.account.deletion-delay-days=7
app.mapping.ccl.violence=ViolentGraphic
app.mapping.ccl.mature=MatureGame
app.mapping.ccl.sexual_content=SexualThemes
app.mapping.ccl.drugs=DrugUse
app.mapping.ccl.gambling=Gambling
app.mapping.ccl.profanity=ProfanityVulgarity
app.mapping.ccl.language_barrier=LanguageBarrier
