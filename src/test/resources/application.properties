# ============================================================
# Test configuration
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/catapult_test}
spring.datasource.username=${DB_USERNAME:catapult}
spring.datasource.password=${DB_PASSWORD:catapult}
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

app.security.token-encryption-key=${TOKEN_ENCRYPTION_KEY:test-encryption-key-32bytes!}

# ============================================================
# OAuth2 credentials (lus par OAuth2ClientConfig)
# ============================================================
TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID:test-twitch-client}
TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET:test-twitch-secret}
STEAM_CLIENT_ID=${STEAM_CLIENT_ID:test-steam-client}
STEAM_CLIENT_SECRET=${STEAM_CLIENT_SECRET:test-steam-secret}
DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:test-discord-client}
DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:test-discord-secret}

# ============================================================
# IGDB
# ============================================================
app.igdb.client-id=test
app.igdb.preload-ttl-hours=24

# ============================================================
# App
# ============================================================
app.polling.interval-seconds=60
app.account.deletion-delay-days=7
