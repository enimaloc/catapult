spring.application.name=catapult

# ============================================================
# Logging
# ============================================================
logging.level.fr.esportline.catapult=TRACE
logging.level.org.flywaydb=DEBUG

# ============================================================
# Base de données
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/catapult
spring.datasource.username=catapult
spring.datasource.password=changeme
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
# ============================================================
# IGDB (fallback sur TWITCH_CLIENT_ID si non renseigné)
# ============================================================
app.igdb.client-id=${IGDB_CLIENT_ID:${twitch.client-id:}}
app.igdb.preload-ttl-hours=24
app.igdb.preload-limit=500

# ============================================================
# Polling & Scheduler
# ============================================================
app.polling.interval-seconds=10

# ============================================================
# Gestion des comptes
# ============================================================
app.account.deletion-delay-days=7

# ============================================================
# Sécurité — chiffrement des tokens OAuth2
# ============================================================
app.security.token-encryption-key=

