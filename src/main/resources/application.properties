spring.application.name=catapult

# ============================================================
# Base de données
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/catapult}
spring.datasource.username=${DB_USERNAME:catapult}
spring.datasource.password=${DB_PASSWORD:catapult}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# ============================================================
# OAuth2 — Twitch (provider principal)
# ============================================================
spring.security.oauth2.client.registration.twitch.client-id=${TWITCH_CLIENT_ID:}
spring.security.oauth2.client.registration.twitch.client-secret=${TWITCH_CLIENT_SECRET:}
spring.security.oauth2.client.registration.twitch.scope=user:read:email,channel:manage:broadcast

# ============================================================
# OAuth2 — Steam (provider secondaire)
# ============================================================
spring.security.oauth2.client.registration.steam.client-id=${STEAM_CLIENT_ID:}
spring.security.oauth2.client.registration.steam.client-secret=${STEAM_CLIENT_SECRET:}

# ============================================================
# OAuth2 — Discord (provider secondaire)
# ============================================================
spring.security.oauth2.client.registration.discord.client-id=${DISCORD_CLIENT_ID:}
spring.security.oauth2.client.registration.discord.client-secret=${DISCORD_CLIENT_SECRET:}

# ============================================================
# IGDB
# ============================================================
app.igdb.client-id=${IGDB_CLIENT_ID:}
app.igdb.preload-ttl-hours=24

# ============================================================
# Polling & Scheduler
# ============================================================
app.polling.interval-seconds=60

# ============================================================
# Gestion des comptes
# ============================================================
app.account.deletion-delay-days=7

# ============================================================
# Sécurité — chiffrement des tokens OAuth2
# ============================================================
app.security.token-encryption-key=${TOKEN_ENCRYPTION_KEY:}

# ============================================================
# Mapping CCL (IGDB -> Twitch)
# ============================================================
app.mapping.ccl.violence=ViolentGraphic
app.mapping.ccl.mature=MatureGame
app.mapping.ccl.sexual_content=SexualThemes
app.mapping.ccl.drugs=DrugUse
app.mapping.ccl.gambling=Gambling
app.mapping.ccl.profanity=ProfanityVulgarity
app.mapping.ccl.language_barrier=LanguageBarrier
