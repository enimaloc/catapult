spring.application.name=catapult

# ============================================================
# Logging
# ============================================================
logging.level.fr.esportline.catapult=INFO

# ============================================================
# Base de données
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/catapult}
spring.datasource.username=${DB_USERNAME:catapult}
spring.datasource.password=${DB_PASSWORD:catapult}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=false

# ============================================================
# IGDB (fallback sur TWITCH_CLIENT_ID si non renseigné)
# ============================================================
app.igdb.client-id=${IGDB_CLIENT_ID:${twitch.client-id:}}
app.igdb.preload-ttl-hours=24
app.igdb.preload-limit=500

# ============================================================
# Polling & Scheduler
# ============================================================
app.polling.interval-seconds=30

# ============================================================
# Gestion des comptes
# ============================================================
app.account.deletion-delay-days=7

# ============================================================
# Sécurité — chiffrement des tokens OAuth2
# ============================================================
app.security.token-encryption-key=${TOKEN_ENCRYPTION_KEY:}

# ============================================================
# Twitch OAuth2
# ============================================================
twitch.client-id=${TWITCH_CLIENT_ID:}
twitch.client-secret=${TWITCH_CLIENT_SECRET:}

# ============================================================
# Steam (clé API serveur — https://steamcommunity.com/dev/apikey)
# ============================================================
steam.api-key=${STEAM_API_KEY:}

# ============================================================
# URL de base de l'application (utilisée pour les redirects OpenID)
# ============================================================
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ============================================================
# Xbox OAuth2 (optionnel)
# ============================================================
xbox.client-id=${XBOX_CLIENT_ID:}
xbox.client-secret=${XBOX_CLIENT_SECRET:}

# ============================================================
# Battle.net OAuth2 (optionnel)
# ============================================================
battlenet.client-id=${BATTLENET_CLIENT_ID:}
battlenet.client-secret=${BATTLENET_CLIENT_SECRET:}

