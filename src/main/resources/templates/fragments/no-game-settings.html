<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="no-game-settings" class="card">
    <h3>Catégorie par défaut (sans jeu)</h3>
    <p class="text-muted" style="margin-bottom:1rem">
        Catégorie et CCLs appliquées automatiquement quand aucun jeu n'est détecté.
    </p>

    <form th:action="@{/settings/no-game}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="inline-edit-fields">
            <div class="inline-edit-field">
                <label>Catégorie Twitch</label>
                <div class="search-wrapper">
                    <input type="text"
                           id="gameSearch-noGame"
                           th:value="${noGameSettings.noGameTwitchGameName}"
                           placeholder="Rechercher…"
                           autocomplete="off"
                           oninput="debouncedSearch(event, 'noGame')">
                    <ul id="gameResults-noGame" class="game-results"></ul>
                </div>
                <input type="hidden" id="twitchGameId-noGame"
                       name="twitchGameId"
                       th:value="${noGameSettings.noGameTwitchGameId}">
                <input type="hidden" id="twitchGameName-noGame"
                       name="twitchGameName"
                       th:value="${noGameSettings.noGameTwitchGameName}">
            </div>
            <div class="inline-edit-field">
                <label>CCLs</label>
                <div class="ccl-checkboxes">
                    <div th:each="ccl : ${availableCcls}">
                        <label>
                            <input type="checkbox" name="ccls"
                                   th:value="${ccl.id}"
                                   th:checked="${noGameSettings.noGameCcls.contains(ccl.id)}">
                            <span th:text="${ccl.name}"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div class="inline-edit-actions" style="margin-top:12px">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
    </form>

</section>
</body>
</html>
