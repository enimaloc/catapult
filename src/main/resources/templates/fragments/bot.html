<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="bot" class="card">
    <h3>Bot</h3>
    <form th:action="@{/settings/bot}" method="post">
        <label class="toggle">
            <input type="checkbox" name="enabled" th:checked="${user.botEnabled}">
            <span>Activer le bot</span>
        </label>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
    </form>
</section>
</body>
</html>
