<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mock Twitch EventSub</title>
    <style>
        body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 16px; background: #1a0a2e; color: #eee; }
        h1 { color: #9146ff; border-bottom: 1px solid #333; padding-bottom: 8px; }
        h2 { color: #bf94ff; margin-top: 32px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: .85em; }
        .badge-live   { background: #e91916; color: #fff; }
        .badge-offline { background: #555; color: #ccc; }
        .card { background: #0e0a1e; border: 1px solid #9146ff44; border-radius: 8px; padding: 20px; margin: 16px 0; }
        table { width: 100%; border-collapse: collapse; font-size: .9em; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #333; text-align: left; vertical-align: middle; }
        th { color: #bf94ff; }
        button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: .85em; }
        .btn-live    { background: #e91916; color: #fff; }
        .btn-offline { background: #555; color: #ccc; }
        .empty { color: #555; font-style: italic; }
        .actions { display: flex; gap: 6px; }
    </style>
</head>
<body>

<h1>📡 Mock Twitch EventSub</h1>
<p style="color:#888">Profile <code>mock</code> actif — les événements stream.online / stream.offline sont émis directement en mémoire.</p>

<h2>Utilisateurs</h2>
<div class="card">
    <table th:if="${!usersLiveStatus.isEmpty()}">
        <thead>
            <tr>
                <th>Utilisateur Twitch</th>
                <th>Twitch ID</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        <tr th:each="entry : ${usersLiveStatus}">
            <td th:text="${entry.key.twitchUsername}"></td>
            <td style="color:#888;font-size:.85em" th:text="${entry.key.twitchId}"></td>
            <td>
                <span th:if="${entry.value}"   class="badge badge-live">🔴 LIVE</span>
                <span th:if="${!entry.value}"  class="badge badge-offline">OFFLINE</span>
            </td>
            <td>
                <div class="actions">
                    <form th:action="@{/mock/twitch/online}" method="post"> <!-- nosemgrep -->
                        <input type="hidden" name="userId" th:value="${entry.key.id}">
                        <button type="submit" class="btn-live" th:disabled="${entry.value}">▶ Online</button>
                    </form>
                    <form th:action="@{/mock/twitch/offline}" method="post"> <!-- nosemgrep -->
                        <input type="hidden" name="userId" th:value="${entry.key.id}">
                        <button type="submit" class="btn-offline" th:disabled="${!entry.value}">■ Offline</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${usersLiveStatus.isEmpty()}" class="empty">Aucun utilisateur en base</p>
</div>

</body>
</html>
