<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{template::layout(~{::title}, null, ~{::body}, null, null)}">
<head>
    <title>Catapult - Mock Login</title>
</head>
<body>
<div class="login-page">
    <div class="login-container">
        <div class="login-card">
            <h1>🚀 Catapult</h1>
            <p class="subtitle">Mode développement — sélectionner un utilisateur</p>
            <form method="post" th:action="@{/mock-login}"> <!-- nosemgrep -->
                <div class="form-group">
                    <select name="userId" class="form-control">
                        <th:block th:each="user : ${users}">
                            <option th:value="${user.id}"
                                    th:text="${user.twitchUsername + (user.twitchId == ownerId ? ' (admin)' : '')}">
                            </option>
                        </th:block>
                    </select>
                </div>
                <button type="submit" class="btn" style="width:100%;justify-content:center;margin-top:12px">
                    Se connecter
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
