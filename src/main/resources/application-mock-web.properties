# ============================================================
# Base de données — H2 in-memory
# ============================================================
spring.datasource.url=jdbc:h2:mem:catapult;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ============================================================
# Flyway désactivé — schéma créé par Hibernate
# ============================================================
spring.flyway.enabled=false

# ============================================================
# H2 Console (utile pour déboguer le schéma et les données)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# Clé de chiffrement factice — 32 octets en base64
# ============================================================
app.security.token-encryption-key=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

# ============================================================
# Identifiant du propriétaire (correspond au twitchId de l'admin mock)
# ============================================================
app.owner-id=mock-admin

# ============================================================
# Twitch — valeurs factices (aucun appel réseau en mock-web)
# ============================================================
twitch.client-id=mock-client-id
twitch.client-secret=mock-client-secret

# ============================================================
# Chat — mock (pas de connexion IRC ni EventSub)
# ============================================================
app.chat.provider=mock

# ============================================================
# URL de base
# ============================================================
app.base-url=http://localhost:8080

# ============================================================
# Steam actif via MockSteamApiClient (profil mock-steam inclus)
# ============================================================
steam.enabled=true

# ============================================================
# IGDB — vide pour court-circuiter les appels réseau dès IgdbService.init()
# ============================================================
app.igdb.client-id=
app.igdb.preload-ttl-hours=999
app.igdb.preload-limit=0
